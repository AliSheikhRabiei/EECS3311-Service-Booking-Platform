# =============================================================================
# DEVELOPMENT-ONLY FILE - DO NOT USE FOR NORMAL STARTUP
# =============================================================================
# This file is for running ONLY the database + backend during active backend
# development (when you don't need the frontend container).
#
# For the full Phase 2 system (db + backend + frontend), always use the
# docker-compose.yml in the PROJECT ROOT folder, one level above this file.
#
# Root:    EECS3311-Service-Booking-Platform/docker-compose.yml  <- use this
# This:    EECS3311-Service-Booking-Platform/Backend/docker-compose.yml  <- dev only
# =============================================================================

services:

  db:
    image: postgres:16-alpine
    container_name: booking_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: booking_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d booking_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: booking_backend
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_URL: jdbc:postgresql://db:5432/booking_platform
      DB_USER: postgres
      DB_PASSWORD: postgres

volumes:
  pgdata:
