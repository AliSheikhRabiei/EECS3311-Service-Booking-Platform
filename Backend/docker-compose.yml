version: "3.9"

services:

  # ── PostgreSQL database ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: booking_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       booking_platform
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"         # exposed so you can connect with pgAdmin or psql locally
    volumes:
      - pgdata:/var/lib/postgresql/data   # data survives docker-compose down
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d booking_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Java backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: booking_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy     # wait until Postgres is accepting connections
    ports:
      - "8080:8080"
    environment:
      PORT:           8080
      DB_URL:         jdbc:postgresql://db:5432/booking_platform
      DB_USER:        postgres
      DB_PASSWORD:    postgres
      ADMIN_EMAIL:    admin@platform.com
      ADMIN_PASSWORD: admin123

volumes:
  pgdata:
